  <path d="M 256 224 C 226 224 204 202 200 168 C 236 168 256 190 256 224 Z" fill="#6B8F71"/>
  <path d="M 256 200 C 286 200 308 178 312 144 C 276 144 256 166 256 200 Z" fill="#8CAE8F"/>
